# ============================================================
# VAMOS config/config.v1.toml — V0 활성 14섹션 (B4 13 + [confidence])
# 정본 추출원: PHASE_B4_CONFIG_SPEC §3/§4.1 V1 프리셋 + PART2 V0-STEP-1 템플릿 (창작 0)
# 생성: P4-1 (2026-06-12, 로드맵 4-5). V1+ 확장 17(+1)섹션은 PHASE_B4 §3 정본 참조.
# LOCK 분모 23(D13 20 + confidence 3 — PHASE3-DEC-010) 중 V0 물리 수록 21
#   (blue_nodes.active_node_cap·ui.min_width 2키는 V1+ 섹션 — V0 부재 정상)
# 검증: scripts/check_config_lock.py (Hook 자동 호출)
# ============================================================

[core]                           # PHASE_B4 §3.1
autonomy_level = "L1"
default_execution_mode = "mini"
max_decision_timeout_ms = 30000
single_decision_lock = true      # LOCK
pipeline_stages = ["intake", "plan", "execute", "verify", "deliver"]
ipc_max_restart = 3              # 비-LOCK — PHASE4-DEC-009/FIX-027 ([ipc] 섹션은 B4 미정의 → [core] 하위)
ipc_timeout_s = 30               # 비-LOCK — PHASE4-DEC-009/FIX-027

[llm]                            # PHASE_B4 §3.2
mini_model = "ollama/llama3.2:3b"
main_model = "ollama/llama3.1:8b"
fallback_model = "gpt-4o-mini"
temperature = 0.3
max_tokens = 2048
streaming_enabled = true
prompt_cache_enabled = true
prompt_cache_ttl_sec = 3600

[embedding]                      # PHASE_B4 §3.3
model = "bge-m3"                 # LOCK
dimension = 1024                 # LOCK
matryoshka_dim = 256
batch_size = 32
local_enabled = true

[vector_db]                      # PHASE_B4 §3.4
backend = "chroma"               # LOCK (V1)
mode = "embedded"
collection_name = "vamos_default"
persist_directory = "${VAMOS_DATA_DIR}/chroma"
similarity_metric = "cosine"

[graph_db]                       # PHASE_B4 §3.5
backend = "json_file"            # LOCK (V1)
json_path = "${VAMOS_DATA_DIR}/graph/graph.json"
max_hops = 2
scope = "P1"
cache_enabled = true

[storage]                        # PHASE_B4 §3.6 (memory TTL 포함 — 별도 [memory] 섹션 없음)
backend = "sqlite"
db_path = "${VAMOS_DATA_DIR}/sqlite/vamos.db"
log_format = "jsonl"
log_path = "${VAMOS_DATA_DIR}/logs/events.jsonl"
backup_enabled = true
backup_schedule = "daily"
backup_retain_count = 7
memory_ttl_L0 = "session_end"    # 최대 30일 (CLAUDE.md §15 정본)
memory_ttl_L1 = "90d"
memory_ttl_L2 = "indefinite"
memory_ttl_L3 = "policy_based"

[cost]                           # PHASE_B4 §3.7 + PHASE4-DEC-002 병존
daily_limit = 1300               # ABSOLUTE LOCK (KRW)
monthly_limit = 40000            # ABSOLUTE LOCK (KRW)
warn_threshold = 80              # LOCK 게이트 — force_mini 다운시프트 (DEC-005·D13)
block_threshold = 100            # LOCK 게이트 — deny 차단 (변경 불가)
alert_thresholds = [70, 85, 95]  # P30-058 3단계 경보 (비-LOCK, 통지 전용 — PHASE4-DEC-002)
downshift_model = "ollama/llama3.2:3b"
currency = "KRW"
tracking_enabled = true

[self_check]                     # PHASE_B4 §3.8a
threshold_p0 = 70                # LOCK
threshold_p1 = 75                # LOCK
threshold_p2 = 80                # LOCK
soft_loop_max = 1                # LOCK — 자동 Soft loop 1회만

[approval]                       # PHASE_B4 §3.8b
timeout_s = 600                  # LOCK — 10분 미응답 시 자동 거부
p2_timeout_s = 300               # LOCK — P2/HITL 5분

[mcp]                            # PHASE_B4 §3.9
transport = "streamable_http"    # LOCK (DEC-017)
default_timeout_ms = 10000
max_retries = 2                  # V1/V2=2 · V3=3 (PHASE_B4 §3.9 정본, GATE-07d)
bridges = []

[rbac]                           # PHASE_B4 §3.10
default_role = "OWNER"           # V1: 단일 사용자

[rbac.roles.OWNER]
description = "플랫폼 소유자"
can_configure = true
can_approve = true
can_execute = true
can_view = true
max_autonomy = "L3"

[rbac.roles.ADMIN]
description = "관리자"
can_configure = true
can_approve = true
can_execute = true
can_view = true
max_autonomy = "L2"

[rbac.roles.OPERATOR]
description = "운영자"
can_configure = false
can_approve = false
can_execute = true
can_view = true
max_autonomy = "L1"

[rbac.roles.VIEWER]
description = "조회자"
can_configure = false
can_approve = false
can_execute = false
can_view = true
max_autonomy = "L0"

[logging]                        # PHASE_B4 §3.12
level = "INFO"
format = "json"                  # LOCK 성격: 평문 금지
trace_id_required = true         # LOCK
sinks = ["file"]
# NOTE: B4 §4.1 프리셋의 [[logging.sinks]] 테이블은 sinks 배열 키와 동일명 충돌(유효 TOML 불가 — B4 내부 이형, P4-1 기록).
#       V0는 PART2 V0-STEP-1 템플릿 표기 + §3.12 sinks 스칼라 배열 채택. sink 상세 테이블은 V1+ B4 정본 정비 후.

[semantic_cache]                 # PHASE_B4 §3.15
enabled = true
similarity_threshold = 0.95      # LOCK
max_entries = 1000
ttl_sec = 86400                  # D2.0-06 §4.7.2 정본 24h (PART2 SOURCE_CONFLICT 중재: DESIGN 2.0 > PHASE_B)

[confidence]                     # PHASE_B4 §3.16 — PHASE3-DEC-010 신규 LOCK 3키 (R1-A25)
confidence_high_threshold = 0.85     # LOCK
confidence_medium_threshold = 0.60   # LOCK
confidence_refuse_threshold = 0.30   # LOCK
