# Alembic config -- VAMOS V1 data layer (PHASE5-DEC-001 item 16 / A23 V0->V1 migration).
# sqlalchemy.url is resolved dynamically by alembic/env.py
# (VAMOS_DB_PATH > config.storage.db_path > default). Do NOT hardcode the URL here:
# env.py absorbs per-environment data_dir differences (A23 config-key compatibility).
# NOTE: ASCII-only file (Windows configparser uses locale/cp949 encoding).
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

# logging -- alembic standard minimal config
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
